version: "3.9"

services:
  # =========================================================================
  # Nginx — Reverse Proxy
  # =========================================================================
  nginx:
    image: nginx:1.27-alpine
    container_name: ganitmitra-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./frontend/public:/usr/share/nginx/static:ro
    depends_on:
      - frontend
      - backend
    networks:
      - ganitmitra-net
    restart: unless-stopped

  # =========================================================================
  # Frontend — Next.js 15
  # =========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${APP_ENV:-development}
    container_name: ganitmitra-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
      - NEXT_PUBLIC_APP_ENV=${APP_ENV:-development}
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - ganitmitra-net
    restart: unless-stopped

  # =========================================================================
  # Backend — FastAPI
  # =========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${APP_ENV:-development}
    container_name: ganitmitra-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/__pycache__
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - QDRANT_HOST=qdrant
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - ganitmitra-net
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --workers 1"

  # =========================================================================
  # PostgreSQL 16
  # =========================================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ganitmitra-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-ganitmitra}
      - POSTGRES_USER=${POSTGRES_USER:-ganitmitra}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ganitmitra_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ganitmitra} -d ${POSTGRES_DB:-ganitmitra}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ganitmitra-net
    restart: unless-stopped

  # =========================================================================
  # Redis 7
  # =========================================================================
  redis:
    image: redis:7-alpine
    container_name: ganitmitra-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ganitmitra-net
    restart: unless-stopped

  # =========================================================================
  # Qdrant — Vector DB
  # =========================================================================
  qdrant:
    image: qdrant/qdrant:v1.12
    container_name: ganitmitra-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ganitmitra-net
    restart: unless-stopped

  # =========================================================================
  # Langfuse — LLM Observability
  # =========================================================================
  langfuse:
    image: ghcr.io/langfuse/langfuse:latest
    container_name: ganitmitra-langfuse
    ports:
      - "3002:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ganitmitra}:${POSTGRES_PASSWORD:-ganitmitra_dev}@postgres:5432/langfuse
      - NEXTAUTH_SECRET=${JWT_SECRET_KEY:-change-me}
      - NEXTAUTH_URL=http://localhost:3002
      - SALT=ganitmitra-salt
      - TELEMETRY_ENABLED=false
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ganitmitra-net
    restart: unless-stopped

  # =========================================================================
  # Prometheus — Metrics
  # =========================================================================
  prometheus:
    image: prom/prometheus:v2.54
    container_name: ganitmitra-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - ganitmitra-net
    restart: unless-stopped

  # =========================================================================
  # Grafana — Dashboards
  # =========================================================================
  grafana:
    image: grafana/grafana:11.2
    container_name: ganitmitra-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=ganitmitra
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - ganitmitra-net
    restart: unless-stopped

networks:
  ganitmitra-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  prometheus_data:
  grafana_data:
